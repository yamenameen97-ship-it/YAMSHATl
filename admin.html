<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0f172a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | لوحة الإدارة</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body class="feed-page">
    <header class="header glass">
        <div class="header-row">
            <button class="icon-btn" onclick="window.location.href='feed.html'">⬅</button>
            <div>
                <div class="brand-title">🛠️ لوحة الإدارة الاحترافية</div>
                <div class="subtle-text">مراجعة البلاغات والمنشورات ومتابعة حركة المنصة</div>
            </div>
            <button class="icon-btn" onclick="window.location.reload()">🔄</button>
        </div>
    </header>

    <main class="container">
        <div id="adminContent" class="admin-content"></div>
    </main>

    <script src="assets/auth.js"></script>
    <script src="assets/app.js"></script>
    <script>
        async function verifyAdminAccessCode() {
            const accessKey = 'yamshatAdminAccessGranted';
            try {
                if (sessionStorage.getItem(accessKey) === '1') return true;
            } catch (_) {}
            const code = window.prompt('أدخل رمز لوحة الإدارة');
            if (code !== '12345678') {
                const box = document.getElementById('adminContent');
                if (box) box.innerHTML = '<div class="empty-state">الرمز غير صحيح</div>';
                setTimeout(() => { window.location.href = 'feed.html'; }, 900);
                return false;
            }
            try {
                sessionStorage.setItem(accessKey, '1');
            } catch (_) {}
            return true;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                if (!(await verifyAdminAccessCode())) return;
                await checkSession(true);
                await openAdminPanel();
            } catch (error) {
                const box = document.getElementById('adminContent');
                if (box) box.innerHTML = `<div class="empty-state">${String(error.message || 'تعذر تحميل لوحة الإدارة')}</div>`;
            }
        });
    </script>
</body>
</html>

[alembic]
script_location = alembic
prepend_sys_path = .
# v85.2 fix: alembic/env.py يقوم بتعيين sqlalchemy.url من
# settings.effective_database_url (بعد normalize + sslmode). لا نحتاج
# %(DATABASE_URL)s هنا لأنه كان يسبب InterpolationMissingOptionError
# عند وجود ٪ في كلمة المرور.
# sqlalchemy.url = sqlite:///./yamshat.db  # placeholder — يُستبدل من env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

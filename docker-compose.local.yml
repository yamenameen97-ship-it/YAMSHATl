version: '3.9'

services:
  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://gateway:8000
    depends_on:
      - gateway

  # API Gateway
  gateway:
    build: ./gateway
    ports:
      - '8000:8000'
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8000
      POST_SERVICE_URL: http://post-service:8000
      CHAT_SERVICE_URL: http://chat-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      MEDIA_SERVICE_URL: http://media-service:8000
      SEARCH_SERVICE_URL: http://search-service:8000
      CORS_ORIGINS: 'http://localhost:5173,http://localhost:3000'
    depends_on:
      - auth-service
      - user-service
      - post-service
      - chat-service
      - notification-service
      - media-service
      - search-service

  # Microservices
  auth-service:
    build: ./services/auth-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  post-service:
    build: ./services/post-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  chat-service:
    build: ./services/chat-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  notification-service:
    build: ./notification-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  media-service:
    build: ./services/media-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  search-service:
    build: ./services/search-service
    environment:
      DATABASE_URL: mysql://yamshat_user:password@mysql:3306/yamshat
    depends_on:
      - mysql
      - redis

  # Database
  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: yamshat
      MYSQL_USER: yamshat_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:

networks:
  default:
    name: yamshat-network

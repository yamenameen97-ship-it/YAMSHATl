<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#e00000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | لوحة الإدارة</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
</head>
<body class="feed-page">
    <header class="header glass">
        <div class="header-row">
            <button class="icon-btn" onclick="window.location.href='feed.html'">⬅</button>
            <div>
                <div class="brand-title">🛠️ لوحة الإدارة الاحترافية</div>
                <div class="subtle-text">مراجعة البلاغات والمنشورات ومتابعة حركة المنصة</div>
            </div>
            <button class="icon-btn" onclick="window.location.reload()">🔄</button>
        </div>
    </header>

    <main class="container">
        <div id="adminContent" class="admin-content"></div>
    </main>

    <script src="/api/app-config.js"></script>
    <script src="assets/auth.js"></script>
    <script src="assets/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await checkSession(true);
                await openAdminPanel();
            } catch (error) {
                const box = document.getElementById('adminContent');
                if (box) box.innerHTML = `<div class="empty-state">${String(error.message || 'تعذر تحميل لوحة الإدارة')}</div>`;
            }
        });
    </script>
</body>
</html>

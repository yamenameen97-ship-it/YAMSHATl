<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0f172a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | الدردشة</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
</head>
<body class="chat-page">
    <div class="chat-shell glass">
        <div class="header chat-header">
            <div class="header-row">
                <button class="icon-btn" onclick="goFeed()">⬅</button>
                <div>
                    <div>💬 الدردشة</div>
                    <div class="subtle-text" id="chatWith">جاري التحميل...</div>
                </div>
                <button class="icon-btn" onclick="goProfile()">👤</button>
            </div>
        </div>

        <div id="messages" class="messages-box"></div>

        <div class="input-box glass">
            <input type="text" id="msgInput" placeholder="اكتب رسالة...">
            <button onclick="sendMsg(this)">إرسال</button>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="feed.html" class="nav-item active">الصفحة الرئيسية</a>
        <a href="search.html" class="nav-item">استكشاف</a>
        <a href="upload.html" class="nav-item">رفع منشور</a>
        <a href="profile.html" class="nav-item">الملف الشخصي</a>
    </nav>

    <!-- Posts Feed -->
    <div class="feed">
        <div class="post">
            <div class="post-header">
                <img src="assets/user-avatar.jpg" class="avatar" alt="User Avatar">
                <span class="username">Sarah</span>
            </div>
            <img src="assets/sample-post.jpg" class="post-image" alt="Post Image">
            <div class="post-actions">
                <button class="like-button">❤️</button>
                <span class="likes-count">1234 إعجاب</span>
            </div>
            <div class="post-comments">
                <span class="comment">
                    <strong>محمد:</strong> لحظة جميلة!
                </span>
                <span class="comment">
                    <strong>أحمد:</strong> هذه أفضل صورة 🌅
                </span>
            </div>
        </div>
        <!-- Repeat post block for more posts -->
    </div>

</body>
</html>

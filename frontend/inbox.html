<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | الرسائل</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <style>
        .inbox-top-search{margin-top:14px}
        .inbox-split{display:grid;grid-template-columns:1.08fr .92fr;gap:14px}
        .thread-card,.suggest-card{align-items:center}
        .thread-avatar{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#a855f7,#6d28d9);box-shadow:0 12px 30px rgba(139,92,246,.24)}
        .thread-copy{display:grid;gap:5px}
        .thread-copy .muted-box{margin-top:0}
        @media (max-width:900px){.inbox-split{grid-template-columns:1fr}}
    </style>
</head>
<body class="inbox-page">
    <header class="header glass">
        <div class="header-row">
            <button class="icon-btn" onclick="window.location.href='feed.html'">⬅</button>
            <div>
                <div class="brand-title">💬 الرسائل</div>
                <div class="subtle-text" id="sessionLabel">جاري تحميل الجلسة...</div>
            </div>
            <button class="icon-btn" onclick="window.location.href='profile.html'">👤</button>
        </div>
        <div class="post-box inbox-top-search">
            <input id="chatSearchInput" type="text" placeholder="ابحث عن اسم لبدء محادثة" autocomplete="off" onkeydown="if(event.key==='Enter') searchUsersForChat()">
            <button onclick="searchUsersForChat()">بحث</button>
        </div>
    </header>

    <main class="container inbox-shell">
        <div class="inbox-split">
            <section class="glass" style="padding:16px;">
                <div class="feed-section-title" style="margin:0 0 12px;">
                    <div>
                        <div class="brand-title">المحادثات السابقة</div>
                        <div class="subtle-text">قائمة مرتبة بنفس الطابع الداكن الناعم</div>
                    </div>
                </div>
                <div id="threads"></div>
            </section>

            <section class="glass" style="padding:16px;">
                <div class="feed-section-title" style="margin:0 0 12px;">
                    <div>
                        <div class="brand-title">بدء دردشة جديدة</div>
                        <div class="subtle-text">ابحث عن أي مستخدم ثم افتح المحادثة مباشرة</div>
                    </div>
                </div>
                <div id="suggestions">
                    <div class="empty-state">ابحث عن اسم مستخدم لبدء محادثة جديدة</div>
                </div>
            </section>
        </div>
    </main>

    <script src="app-config.js"></script>
    <script src="assets/auth.js"></script>
    <script>
        const API_BASE = window.API_BASE || `${window.location.origin.replace(/\/+$/, "")}/api`;
        let currentUser = "";

        function escapeHTML(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function showToast(msg) {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        const requestJSON = window.requestJSON;

        async function checkSession() {
            const data = await requestJSON(`${API_BASE}/me`);
            if (!data.user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = data.user;
            document.getElementById("sessionLabel").innerText = `مرحباً ${currentUser}`;
        }

        async function loadThreads() {
            const box = document.getElementById("threads");
            try {
                const data = await requestJSON(`${API_BASE}/chat_threads`);
                if (!data.length) {
                    box.innerHTML = '<div class="empty-state">لا توجد محادثات بعد</div>';
                    return;
                }
                box.innerHTML = data.map(thread => `
                    <div class="thread-card">
                        <div class="thread-preview">
                            <div class="thread-avatar">👤</div>
                            <div class="thread-copy">
                                <b>${escapeHTML(thread.name)}</b>
                                <div class="muted-box">جاهز لاستكمال الرسائل والوسائط</div>
                            </div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(thread.name)})">فتح المحادثة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(thread.name)}'">الملف الشخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        async function searchUsersForChat() {
            const input = document.getElementById("chatSearchInput");
            const box = document.getElementById("suggestions");
            const query = input?.value.trim();
            if (!query) {
                box.innerHTML = '<div class="empty-state">اكتب اسم المستخدم أولاً</div>';
                return;
            }
            box.innerHTML = '<div class="empty-state">جاري البحث...</div>';
            try {
                const data = await requestJSON(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const users = (Array.isArray(data.users) ? data.users : []).filter(user => user.name !== currentUser);
                if (!users.length) {
                    box.innerHTML = '<div class="empty-state">لا يوجد مشترك مطابق لهذا الاسم</div>';
                    return;
                }
                box.innerHTML = users.map(user => `
                    <div class="suggest-card">
                        <div class="thread-preview">
                            <div class="thread-avatar">👤</div>
                            <div class="thread-copy">
                                <b>${escapeHTML(user.name)}</b>
                                <div class="muted-box">تم إخفاء البريد حفاظاً على الخصوصية</div>
                            </div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(user.name)})">مراسلة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(user.name)}'">ملف شخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        function openChat(name) {
            window.location.href = `chat.html?user=${encodeURIComponent(name)}`;
        }

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                await checkSession();
                await loadThreads();
            } catch (error) {
                showToast(error.message);
            }
        });
    </script>
</body>
</html>

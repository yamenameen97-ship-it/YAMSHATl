<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#e00000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | الرسائل</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <style>
        .inbox-page { padding-bottom: 40px; }
        .inbox-shell { padding: 10px; }
        .inbox-grid { display: grid; gap: 14px; }
        .thread-card, .suggest-card {
            margin-top: 10px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .muted-box { color: rgba(255,255,255,0.72); font-size: 13px; margin-top: 6px; }
        .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
    <link rel="manifest" href="site.webmanifest">
</head>
<body class="inbox-page">
    <header class="header glass">
        <div class="header-row">
            <button class="icon-btn" onclick="window.location.href='feed.html'">⬅</button>
            <div>
                <div class="brand-title">💬 الرسائل</div>
                <div class="subtle-text" id="sessionLabel">جاري تحميل الجلسة...</div>
            </div>
            <button class="icon-btn" onclick="window.location.href='profile.html'">👤</button>
        </div>
    </header>

    <main class="container inbox-shell">
        <div class="inbox-grid">
            <section class="glass" style="padding:16px;">
                <h3>المحادثات السابقة</h3>
                <div class="muted-box">لن تظهر جميع الحسابات هنا. ستظهر فقط المحادثات التي سبق التحدث معها.</div>
                <div id="threads"></div>
            </section>

            <section class="glass" style="padding:16px;">
                <h3>البحث عن مشترك لبدء دردشة</h3>
                <div class="post-box" style="margin-top:12px;">
                    <input id="chatSearchInput" type="text" placeholder="ابحث بالاسم فقط" autocomplete="off" onkeydown="if(event.key==='Enter') searchUsersForChat()">
                    <button onclick="searchUsersForChat()">بحث</button>
                </div>
                <div id="suggestions">
                    <div class="empty-state">ابحث عن اسم مستخدم لبدء محادثة جديدة</div>
                </div>
            </section>
        </div>
    </main>

    <script src="app-config.js"></script>
    <script src="assets/auth.js"></script>
    <script>
        const API_BASE = window.API_BASE || `${window.location.origin.replace(/\/+$/, "")}/api`;
        let currentUser = "";

        function escapeHTML(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function showToast(msg) {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        const requestJSON = window.requestJSON;

        async function checkSession() {
            const data = await requestJSON(`${API_BASE}/me`);
            if (!data.user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = data.user;
            document.getElementById("sessionLabel").innerText = `مرحباً ${currentUser}`;
        }

        async function loadThreads() {
            const box = document.getElementById("threads");
            try {
                const data = await requestJSON(`${API_BASE}/chat_threads`);
                if (!data.length) {
                    box.innerHTML = '<div class="empty-state">لا توجد محادثات بعد</div>';
                    return;
                }
                box.innerHTML = data.map(thread => `
                    <div class="thread-card">
                        <div>
                            <b>${escapeHTML(thread.name)}</b>
                            <div class="muted-box">افتح المحادثة واستكمل الرسائل</div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(thread.name)})">فتح المحادثة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(thread.name)}'">الملف الشخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        async function searchUsersForChat() {
            const input = document.getElementById("chatSearchInput");
            const box = document.getElementById("suggestions");
            const query = input?.value.trim();
            if (!query) {
                box.innerHTML = '<div class="empty-state">اكتب اسم المستخدم أولاً</div>';
                return;
            }
            box.innerHTML = '<div class="empty-state">جاري البحث...</div>';
            try {
                const data = await requestJSON(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const users = (Array.isArray(data.users) ? data.users : []).filter(user => user.name !== currentUser);
                if (!users.length) {
                    box.innerHTML = '<div class="empty-state">لا يوجد مشترك مطابق لهذا الاسم</div>';
                    return;
                }
                box.innerHTML = users.map(user => `
                    <div class="suggest-card">
                        <div>
                            <b>${escapeHTML(user.name)}</b>
                            <div class="muted-box">تم إخفاء البريد حفاظاً على الخصوصية</div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(user.name)})">مراسلة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(user.name)}'">ملف شخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        function openChat(name) {
            window.location.href = `chat.html?user=${encodeURIComponent(name)}`;
        }

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                await checkSession();
                await loadThreads();
            } catch (error) {
                showToast(error.message);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0f172a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamshat | الرسائل</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <style>
        .inbox-page { padding-bottom: 40px; }
        .inbox-shell { padding: 10px; }
        .inbox-grid { display: grid; gap: 14px; }
        .thread-card, .suggest-card {
            margin-top: 10px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .muted-box { color: rgba(255,255,255,0.72); font-size: 13px; margin-top: 6px; }
        .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body class="inbox-page">
    <header class="header glass">
        <div class="header-row">
            <button class="icon-btn" onclick="window.location.href='feed.html'">⬅</button>
            <div>
                <div class="brand-title">💬 الرسائل</div>
                <div class="subtle-text" id="sessionLabel">جاري تحميل الجلسة...</div>
            </div>
            <button class="icon-btn" onclick="window.location.href='profile.html'">👤</button>
        </div>
    </header>

    <main class="container inbox-shell">
        <div class="inbox-grid">
            <section class="glass" style="padding:16px;">
                <h3>المحادثات الأخيرة</h3>
                <div id="threads"></div>
            </section>

            <section class="glass" style="padding:16px;">
                <h3>ابدأ محادثة جديدة</h3>
                <div id="suggestions"></div>
            </section>
        </div>
    </main>

    <script>
        const API_BASE = (() => {
            const saved = (localStorage.getItem("apiBase") || "").trim().replace(/\/+$/, "");
            if (saved) {
                return saved.endsWith("/api") ? saved : `${saved}/api`;
            }
            return `${window.location.origin.replace(/\/+$/, "")}/api`;
        })();
        let currentUser = "";

        function escapeHTML(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function showToast(msg) {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        async function requestJSON(url, options = {}) {
            const response = await fetch(url, { credentials: "include", ...options });
            const data = await response.json().catch(() => ({ message: "حدث خطأ غير متوقع" }));
            if (!response.ok) throw new Error(data.message || "حدث خطأ في الطلب");
            return data;
        }

        async function checkSession() {
            const data = await requestJSON(`${API_BASE}/me`);
            if (!data.user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = data.user;
            document.getElementById("sessionLabel").innerText = `مرحباً ${currentUser}`;
        }

        async function loadThreads() {
            const box = document.getElementById("threads");
            try {
                const data = await requestJSON(`${API_BASE}/chat_threads`);
                if (!data.length) {
                    box.innerHTML = '<div class="empty-state">لا توجد محادثات بعد</div>';
                    return;
                }
                box.innerHTML = data.map(thread => `
                    <div class="thread-card">
                        <div>
                            <b>${escapeHTML(thread.name)}</b>
                            <div class="muted-box">افتح المحادثة واستكمل الرسائل</div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(thread.name)})">فتح المحادثة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(thread.name)}'">الملف الشخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        async function loadSuggestions() {
            const box = document.getElementById("suggestions");
            try {
                const data = await requestJSON(`${API_BASE}/users`);
                const users = (Array.isArray(data) ? data : []).filter(user => user.name !== currentUser);
                if (!users.length) {
                    box.innerHTML = '<div class="empty-state">لا يوجد مستخدمون آخرون حالياً</div>';
                    return;
                }
                box.innerHTML = users.map(user => `
                    <div class="suggest-card">
                        <div>
                            <b>${escapeHTML(user.name)}</b>
                            <div class="muted-box">${escapeHTML(user.email)}</div>
                        </div>
                        <div class="inline-actions">
                            <button onclick="openChat(${JSON.stringify(user.name)})">مراسلة</button>
                            <button onclick="window.location.href='profile.html?user=${encodeURIComponent(user.name)}'">ملف شخصي</button>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                box.innerHTML = `<div class="empty-state">${escapeHTML(error.message)}</div>`;
            }
        }

        function openChat(name) {
            window.location.href = `chat.html?user=${encodeURIComponent(name)}`;
        }

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                await checkSession();
                await Promise.all([loadThreads(), loadSuggestions()]);
            } catch (error) {
                showToast(error.message);
            }
        });
    </script>
</body>
</html>

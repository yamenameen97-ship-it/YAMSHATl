<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamshat - منصة تواصل اجتماعي متكاملة</title>
    <link rel="stylesheet" href="assets/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="feed-page">

    <!-- Header -->
    <header class="header glass-effect">
        <div class="header-actions" onclick="toggleServiceMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="brand-name">Yamshat</div>
        <div class="header-actions">
            <div class="relative" onclick="toggleNotifications()">
                <i class="fa-regular fa-bell"></i>
                <span class="badge" id="count">0</span>
            </div>
            <i class="fa-solid fa-magnifying-glass" style="margin-right: 15px;" onclick="openSearch()"></i>
        </div>
    </header>

    <!-- Notifications Box -->
    <div id="notifBox" class="notif-box glass-effect" style="display:none;"></div>

    <!-- Service Menu (Side Menu) -->
    <div id="serviceMenu" class="service-menu glass-effect" style="display:none;">
        <div class="menu-section-title">القائمة</div>
        <button onclick="openProfile(currentUser)"><i class="fa-regular fa-user"></i> الملف الشخصي</button>
        <button onclick="window.location.href='friends.html'"><i class="fa-solid fa-users"></i> الأصدقاء</button>
        <button onclick="window.location.href='groups.html'"><i class="fa-solid fa-layer-group"></i> المجموعات</button>
        <button onclick="window.location.href='live.html'"><i class="fa-solid fa-tower-broadcast"></i> البث المباشر</button>
        <button onclick="goReels()"><i class="fa-solid fa-play"></i> الريلز</button>
        <button onclick="toggleTheme()"><i class="fa-solid fa-moon"></i> الوضع الليلي</button>
        <button class="soft-danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</button>
    </div>

    <!-- Stories Section -->
    <section class="stories-container" id="storyBar">
        <div class="story-item">
            <div class="story-ring add-story" onclick="document.getElementById('storyInput').click()">
                <i class="fa-solid fa-plus"></i>
            </div>
            <span class="story-name">إنشاء قصة</span>
            <input type="file" id="storyInput" hidden accept="image/*,video/*" onchange="uploadStory(this.files[0])">
        </div>
        <!-- Stories will be loaded here by loadStories() -->
    </section>

    <!-- Quick Post Box -->
    <div class="post-card glass-effect" style="padding: 15px; margin-bottom: 0;">
        <div class="post-box">
            <input type="text" id="postContent" placeholder="بماذا تفكر؟" style="background: rgba(255,255,255,0.05); border: none;">
            <button onclick="addPost()" style="padding: 10px 20px;">نشر</button>
        </div>
        <div class="upload-grid compact-grid" style="margin-top: 10px;">
            <button class="icon-btn" onclick="document.getElementById('postMedia').click()" style="width: 100%; background: rgba(255,255,255,0.05);">
                <i class="fa-solid fa-image"></i> صورة / فيديو
            </button>
            <input type="file" id="postMedia" hidden accept="image/*,video/*">
        </div>
    </div>

    <!-- Feed Section -->
    <main id="feed">
        <!-- Posts will be loaded here by loadPosts() -->
        <div class="skeleton-loader" style="padding: 20px; text-align: center;">جاري تحميل المنشورات...</div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav glass-effect">
        <div class="nav-item active" onclick="window.location.href='feed.html'">
            <i class="fa-solid fa-house"></i>
        </div>
        <div class="nav-item" onclick="goReels()">
            <i class="fa-solid fa-play"></i>
        </div>
        <div class="nav-center-btn" onclick="document.getElementById('postContent').focus()">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="nav-item" onclick="window.location.href='inbox.html'">
            <div class="relative">
                <i class="fa-regular fa-comment-dots"></i>
                <span class="badge" id="msgCount">0</span>
            </div>
        </div>
        <div class="nav-item" onclick="openProfile(currentUser)">
            <i class="fa-regular fa-user"></i>
        </div>
    </nav>

    <!-- Scripts -->
    <script src="assets/auth.js"></script>
    <script src="assets/app.js"></script>
    <script>
        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof applyTheme === 'function') applyTheme();
            if (typeof loadPosts === 'function') loadPosts();
            if (typeof loadStories === 'function') loadStories();
            if (typeof loadNotifications === 'function') loadNotifications();
            
            // Auto refresh
            setInterval(() => {
                if (typeof loadNotifications === 'function') loadNotifications();
            }, 30000);
        });

        function goReels() {
            window.location.href = 'reels.html';
        }

        function toggleServiceMenu() {
            const menu = document.getElementById('serviceMenu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }

        function toggleNotifications() {
            const box = document.getElementById('notifBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>

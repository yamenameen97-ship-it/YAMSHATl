<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamshat - منصة تواصل اجتماعي متكاملة</title>
    <link rel="stylesheet" href="assets/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="header glass-effect">
        <div class="header-actions">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="brand-name">Yamshat</div>
        <div class="header-actions">
            <div class="relative">
                <i class="fa-regular fa-bell"></i>
                <span class="badge">3</span>
            </div>
            <i class="fa-solid fa-magnifying-glass" style="margin-right: 15px;"></i>
        </div>
    </header>

    <!-- Stories Section -->
    <section class="stories-container">
        <div class="story-item">
            <div class="story-ring add-story">
                <i class="fa-solid fa-plus"></i>
            </div>
            <span class="story-name">إنشاء قصة</span>
        </div>
        <div class="story-item">
            <div class="story-ring">
                <img src="https://i.pravatar.cc/150?u=1" alt="User">
            </div>
            <span class="story-name">أنت</span>
        </div>
        <div class="story-item">
            <div class="story-ring">
                <img src="https://i.pravatar.cc/150?u=2" alt="User">
            </div>
            <span class="story-name">محمد</span>
        </div>
        <div class="story-item">
            <div class="story-ring">
                <img src="https://i.pravatar.cc/150?u=3" alt="User">
            </div>
            <span class="story-name">سارة</span>
        </div>
        <div class="story-item">
            <div class="story-ring">
                <img src="https://i.pravatar.cc/150?u=4" alt="User">
            </div>
            <span class="story-name">أحمد</span>
        </div>
        <div class="story-item">
            <div class="story-ring">
                <img src="https://i.pravatar.cc/150?u=5" alt="User">
            </div>
            <span class="story-name">ليلى</span>
        </div>
    </section>

    <!-- Feed Section -->
    <main id="feed">
        <!-- Post 1 -->
        <article class="post-card glass-effect">
            <div class="post-header">
                <img src="https://i.pravatar.cc/150?u=2" class="user-avatar" alt="Avatar">
                <div class="user-info">
                    <span class="name">محمد الطائي</span>
                    <span class="time">منذ 5 دقائق</span>
                </div>
                <i class="fa-solid fa-ellipsis" style="margin-right: auto;"></i>
            </div>
            <div class="post-content">
                <p>الحياة جميلة عندما نشاركها مع من نحب ✨ صباح الخير لكل الأصدقاء ❤️ ☀️</p>
            </div>
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" class="post-image" alt="Post Image">
            <div class="post-actions">
                <div class="action-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>128</span>
                </div>
                <div class="action-item">
                    <i class="fa-regular fa-comment"></i>
                    <span>32</span>
                </div>
                <div class="action-item">
                    <i class="fa-solid fa-share-nodes"></i>
                    <span>15</span>
                </div>
            </div>
        </article>

        <!-- Post 2 -->
        <article class="post-card glass-effect">
            <div class="post-header">
                <img src="https://i.pravatar.cc/150?u=3" class="user-avatar" alt="Avatar">
                <div class="user-info">
                    <span class="name">سارة محمد</span>
                    <span class="time">منذ ساعة</span>
                </div>
                <i class="fa-solid fa-ellipsis" style="margin-right: auto;"></i>
            </div>
            <div class="post-content">
                <p>مساء الخير جميعاً 🌸</p>
            </div>
            <div class="post-actions">
                <div class="action-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>85</span>
                </div>
                <div class="action-item">
                    <i class="fa-regular fa-comment"></i>
                    <span>12</span>
                </div>
            </div>
        </article>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav glass-effect">
        <div class="nav-item active">
            <i class="fa-solid fa-house"></i>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-play"></i>
        </div>
        <div class="nav-center-btn">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="nav-item">
            <div class="relative">
                <i class="fa-regular fa-comment-dots"></i>
                <span class="badge">2</span>
            </div>
        </div>
        <div class="nav-item">
            <i class="fa-regular fa-user"></i>
        </div>
    </nav>

    <script src="assets/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0f172a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social App | تسجيل الدخول</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="auth-page">
    <div class="container auth-card glass">
        <div class="brand-block">
            <div class="brand-logo">✨</div>
            <h1>Social App</h1>
            <p>تجربة اجتماعية حديثة بجلسات حقيقية وستوري وريلز ودردشة مباشرة</p>
        </div>

        <div id="loginForm">
            <h2>تسجيل الدخول</h2>
            <input id="loginEmail" type="text" placeholder="الايميل أو رقم الجوال">
            <input id="loginPassword" type="password" placeholder="كلمة المرور">
            <button onclick="login(this)">دخول</button>
            <div class="switch" onclick="showRegister()">ليس لديك حساب؟ إنشاء حساب</div>
        </div>

        <div id="registerForm" class="hidden">
            <h2>إنشاء حساب</h2>
            <input id="registerName" type="text" placeholder="الاسم">
            <input id="registerEmail" type="text" placeholder="الايميل أو رقم الجوال">
            <input id="registerPassword" type="password" placeholder="كلمة المرور">
            <button onclick="register(this)">تسجيل</button>
            <div class="switch" onclick="showLogin()">لديك حساب؟ تسجيل الدخول</div>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>

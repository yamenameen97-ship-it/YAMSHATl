<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#0A0D1A" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="يام شات - تطبيق التواصل الاجتماعي العربي مع دردشة وريلز وبث مباشر" />
    <meta name="application-name" content="Yamshat" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; media-src 'self' data: blob: https:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https: https://fonts.gstatic.com; object-src 'none'" />

    <!-- DNS prefetch + preconnect لتسريع تحميل الخط على الأجهزة الضعيفة -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- خط Noto Sans Arabic مع display=swap لتجنّب FOIT على الأجهزة البطيئة -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap"
    />

    <style>
      /* خط افتراضي على مستوى المستند بالكامل */
      html, body {
        font-family: 'Noto Sans Arabic', 'Tajawal', 'Cairo', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        direction: rtl;
        background-color: #0A0D1A;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        max-width: 100vw;
      }
      /* منع التكبير التلقائي عند التركيز على input في iOS */
      input, textarea, select { font-size: 16px; }
      /* تحسين الأداء على الأجهزة الضعيفة (Redmi Note 8 وما شابهها) */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* شاشة تحميل بسيطة قبل تحميل React */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #0A0D1A url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='25' y1='25' x2='50' y2='58' stroke='%238B5CF6' stroke-width='12' stroke-linecap='round'/><line x1='75' y1='25' x2='50' y2='58' stroke='%238B5CF6' stroke-width='12' stroke-linecap='round'/><line x1='50' y1='58' x2='50' y2='85' stroke='%238B5CF6' stroke-width='12' stroke-linecap='round'/></svg>") center / 80px no-repeat;
        animation: ym-pulse 1.4s ease-in-out infinite;
      }
      @keyframes ym-pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    </style>

    <!-- إعدادات PWA و iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yamshat" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>YAMSHAT - يام شات</title>
    <script src="/app-config.js?v=20260616-r10-pixel-perfect" data-backend-origin="%VITE_BACKEND_ORIGIN%" data-api-base="%VITE_API_BASE%" data-socket-url="%VITE_SOCKET_URL%"></script>
  
<!-- 📱 v48.1 — تصغير الخطوط في الجوال (يام شات) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" />
<style>
/* === Mobile Compact Fonts v48.1 === */
@media (max-width: 768px) {

  h2,.h2 { font-size: 16px !important; line-height: 1.3 !important; }
  h3,.h3 { font-size: 14.5px !important; line-height: 1.3 !important; }
  h4,.h4 { font-size: 13.5px !important; line-height: 1.3 !important; }
  h5,.h5 { font-size: 12.5px !important; line-height: 1.3 !important; }
  h6,.h6 { font-size: 12px !important; line-height: 1.3 !important; }
  p, span, div, li, td, th, label, .text, .caption, .desc { font-size: 12.5px !important; line-height: 1.45 !important; }
  small, .small, .meta, .timestamp, .time { font-size: 10.5px !important; }
  button, .btn, .button, [role="button"], input[type="button"], input[type="submit"], a.btn {
    font-size: 12.5px !important; line-height: 1.2 !important; padding: 6px 10px !important; min-height: 32px !important;
    border-radius: 8px !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important;
    max-width: 100% !important; box-sizing: border-box !important;
  }
  input, textarea, select { font-size: 13px !important; padding: 6px 9px !important; min-height: 34px !important; max-width: 100% !important; box-sizing: border-box !important; border-radius: 8px !important; }
  ::placeholder { font-size: 12px !important; opacity: 0.7; }
  *, *::before, *::after { box-sizing: border-box !important; }
  img, video, iframe, canvas { max-width: 100% !important; height: auto; }
  table { max-width: 100% !important; font-size: 12px !important; table-layout: fixed; }

}
@media (max-width: 480px) {
  html { font-size: 81.25% !important; }
  body { font-size: 12.5px !important; line-height: 1.42 !important; }
  h1,.h1 { font-size: 16px !important; }
  h2,.h2 { font-size: 14.5px !important; }
  h3,.h3 { font-size: 13.5px !important; }
  h4,.h4 { font-size: 12.5px !important; }
  h5,.h5 { font-size: 12px !important; }
  h6,.h6 { font-size: 11.5px !important; }
  p, span, div, li, td, th, label, .text { font-size: 12px !important; }
  small, .small, .meta, .timestamp { font-size: 10px !important; }
  button, .btn, .button, [role="button"], input[type="submit"] { font-size: 11.5px !important; padding: 5px 8px !important; min-height: 30px !important; }
  input, textarea, select { font-size: 12.5px !important; padding: 5px 8px !important; min-height: 32px !important; }
  ::placeholder { font-size: 11.5px !important; }
  .container, .wrapper, main, section { padding-inline: 8px !important; }
}
@media (max-width: 360px) {
  html { font-size: 75% !important; }
  body { font-size: 12px !important; line-height: 1.4 !important; }
  h1,.h1 { font-size: 15px !important; }
  h2,.h2 { font-size: 13.5px !important; }
  h3,.h3 { font-size: 12.5px !important; }
  h4,.h4 { font-size: 12px !important; }
  h5,.h5 { font-size: 11.5px !important; }
  h6,.h6 { font-size: 11px !important; }
  p, span, div, li, td, th, label { font-size: 11.5px !important; }
  small, .small, .meta { font-size: 9.5px !important; }
  button, .btn, .button, [role="button"], input[type="submit"] { font-size: 11px !important; padding: 4px 7px !important; min-height: 28px !important; }
  input, textarea, select { font-size: 12px !important; padding: 4px 7px !important; min-height: 30px !important; }
  ::placeholder { font-size: 11px !important; }
  .container, .wrapper, main, section { padding-inline: 6px !important; }
}
</style>
<!-- /📱 v48.1 -->

</head>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamshat | شات لحظي</title>
    <link rel="stylesheet" href="/chat.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar card">
            <div class="brand">
                <div class="brand-icon">💬</div>
                <div>
                    <h1>Yamshat Chat</h1>
                    <p>Flask + Socket.IO + JS</p>
                </div>
            </div>

            <div class="user-box">
                <div>
                    <span class="label">المستخدم الحالي</span>
                    <strong id="currentUser">...</strong>
                </div>
                <button id="logoutBtn" class="ghost-btn">خروج</button>
            </div>

            <div class="section-title">فتح محادثة</div>
            <label class="input-label">اسم المستخدم الآخر</label>
            <input id="peerInput" class="text-input" placeholder="مثال: user2">

            <label class="input-label">اسم غرفة اختياري</label>
            <input id="roomInput" class="text-input" placeholder="مثال: support-room">

            <button id="joinBtn" class="primary-btn">دخول المحادثة</button>

            <div class="section-title top-gap">الإشعارات</div>
            <button id="notifBell" class="notif-btn">
                🔔 <span id="notifCount">0</span>
            </button>
            <div id="notifList" class="notif-list"></div>

            <div class="tips-box">
                <div>✅ لحظي</div>
                <div>✅ typing</div>
                <div>✅ Seen / Delivered</div>
                <div>✅ صور + صوت</div>
                <div>✅ تعديل / حذف</div>
                <div>✅ Session + JWT</div>
                <div>✅ Rate limit</div>
            </div>
        </aside>

        <main class="chat-panel card">
            <header class="chat-topbar">
                <div>
                    <h2 id="chatTitle">اختر محادثة</h2>
                    <p id="presenceText">بانتظار اختيار مستخدم أو غرفة</p>
                </div>
                <div class="badge-group">
                    <span id="typingBadge" class="typing-badge"></span>
                </div>
            </header>

            <section id="messages" class="messages"></section>

            <div class="composer-tools">
                <input type="file" id="fileInput" accept="image/*,audio/*,video/*,.pdf,.txt">
                <button id="recordBtn" class="ghost-btn">🎙️ تسجيل صوت</button>
                <span id="recordStatus" class="subtle"></span>
            </div>

            <div class="composer">
                <textarea id="messageInput" rows="2" placeholder="اكتب رسالة..."></textarea>
                <button id="sendBtn" class="primary-btn">إرسال</button>
            </div>
        </main>
    </div>

    <script src="/chat.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#e00000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Yamshat | البث المباشر</title>

    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon-32.png">

    <!-- 🔥 LiveKit Library -->
    <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>

    <style>
        body { background:linear-gradient(180deg,#020617 0%, #0f172a 35%, #111827 100%); }
        .live-wrap { padding:calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 28px); max-width:1180px; margin:0 auto; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; }
        .hero, .panel, .metric-card, .room-card { border:1px solid rgba(255,255,255,0.08); background:rgba(15,23,42,0.78); border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.26); }
        .hero { padding:20px; display:grid; grid-template-columns:1.2fr .8fr; gap:16px; }
        .hero h1 { margin:0 0 12px; font-size:30px; }
        .hero p, .muted { color:#cbd5e1; line-height:1.8; }
    </style>

    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
</head>

<body>
<main class="live-wrap">

    <div class="topbar">
        <button class="icon-btn" onclick="window.location.href='feed.html'">⬅ العودة للرئيسية</button>
        <button class="icon-btn" onclick="loadLives()">🔄 تحديث البثوث</button>
    </div>

    <section class="hero">
        <div>
            <h1>ابدأ بثك بشكل مرتب وسريع</h1>
            <p id="sessionLabel">جاري التحقق من الجلسة...</p>

            <div>
                <input id="title" placeholder="اكتب عنوان البث المباشر">
                <button onclick="startLive(this)">ابدأ البث الآن</button>
            </div>
        </div>
    </section>

    <section id="rooms"></section>

</main>

<!-- 🔥 Live Fix (تشغيل الكاميرا والبث) -->
<script src="assets/live_fix.js"></script>

<script>
const API_BASE = window.location.origin + "/api";
let currentUser = "";

async function startLive(button) {
    const title = document.getElementById('title').value.trim();

    if (!title) {
        alert("اكتب عنوان البث");
        return;
    }

    button.disabled = true;
    button.textContent = "جاري التشغيل...";

    try {
        const res = await fetch(API_BASE + "/create_live", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ title })
        });

        const data = await res.json();

        if (!data.token) {
            alert("فشل إنشاء البث");
            return;
        }

        // 🔥 تشغيل البث الحقيقي
        startLiveStream(data.token, data.livekit_url);

        setTimeout(() => {
            window.location.href = "live_room.html?id=" + data.room_id;
        }, 1000);

    } catch (e) {
        alert("خطأ في البث: " + e.message);
    }

    button.disabled = false;
    button.textContent = "ابدأ البث الآن";
}
</script>

</body>
</html>

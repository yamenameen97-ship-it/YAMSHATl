<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Yamshat | Admin Login</title>
  <link rel="icon" type="image/png" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <style>
    :root {
      --bg: #08101d;
      --panel: rgba(15, 23, 42, .82);
      --line: rgba(148, 163, 184, .18);
      --text: #e5eefc;
      --muted: #93a4bf;
      --primary: #2563eb;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(2, 6, 23, .35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: Tahoma, Arial, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,.16), transparent 18%),
        radial-gradient(circle at bottom left, rgba(34,197,94,.10), transparent 20%),
        linear-gradient(180deg, #08101d, #0f172a 60%, #09111f);
      padding: 20px;
    }
    .card {
      width: min(100%, 460px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(18px);
    }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      background: rgba(37,99,235,.14);
      border: 1px solid rgba(96,165,250,.18);
      color: #bfdbfe;
      font-size: .92rem;
    }
    h1 { margin: 0 0 8px; }
    p { color: var(--muted); margin: 0 0 18px; line-height: 1.7; }
    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: rgba(96,165,250,.45); }
    button {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      box-shadow: var(--shadow);
    }
    button:disabled { opacity: .75; cursor: not-allowed; }
    .links {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .links a {
      color: #93c5fd;
      text-decoration: none;
    }
    .error {
      margin-top: 14px;
      color: #fecaca;
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(239,68,68,.14);
      border: 1px solid rgba(239,68,68,.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🔐 Admin Access</div>
    <h1>تسجيل دخول الإدارة</h1>
    <p>سجّل بحساب الأدمن الفعلي. الصفحة تعتمد على نفس API الحالي وتتحقق من الصلاحية قبل فتح لوحة التحكم.</p>

    <input id="identifier" type="text" placeholder="البريد الإلكتروني أو اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">
    <button id="loginBtn" onclick="loginAdmin()">دخول</button>

    <div id="errorBox" class="error"></div>

    <div class="links">
      <a href="index.html">فتح صفحة الدخول العامة</a>
      <a href="feed.html">الرجوع للمنصة</a>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script src="assets/auth.js"></script>
  <script>
    const API_BASE = window.API_BASE || `${window.location.origin.replace(/\/+$/, '')}/api`;
    const ADMIN_ROLES = new Set(['admin', 'superadmin', 'security', 'moderator']);

    function showError(message) {
      const box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.textContent = String(message || 'فشل تسجيل الدخول');
    }

    async function loginAdmin() {
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      document.getElementById('errorBox').style.display = 'none';

      if (!identifier || !password) {
        showError('أدخل بيانات الدخول كاملة');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'جاري تسجيل الدخول...';
      try {
        try { await window.authFetch(`${API_BASE}/logout`, { method: 'POST' }); } catch (_) {}
        window.clearStoredAuth?.();

        const data = await window.requestJSON(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: identifier, username: identifier, identifier, password })
        });

        if (!ADMIN_ROLES.has(String(data.role || '').toLowerCase())) {
          try { await window.authFetch(`${API_BASE}/logout`, { method: 'POST' }); } catch (_) {}
          window.clearStoredAuth?.();
          throw new Error('الحساب الحالي ليس لديه صلاحية دخول لوحة الإدارة');
        }

        window.location.href = 'admin.html';
      } catch (error) {
        showError(error.message || 'تعذر تسجيل الدخول');
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول';
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const me = await window.requestJSON(`${API_BASE}/me`);
        if (me?.user && ADMIN_ROLES.has(String(me.role || '').toLowerCase())) {
          window.location.href = 'admin.html';
        }
      } catch (_) {}
    });
  </script>
</body>
</html>

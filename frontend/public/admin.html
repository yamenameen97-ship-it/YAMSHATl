<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#07111f;color:#fff;font-family:Arial}
.layout{display:flex}
.sidebar{width:260px;background:#0b1324;min-height:100vh;padding:20px;position:fixed;right:0;top:0}
.content{margin-right:260px;padding:20px;width:100%}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{background:#101b31;padding:20px;border-radius:20px}
table{width:100%;border-collapse:collapse;background:#101b31;border-radius:20px;overflow:hidden}
td,th{padding:12px;border-bottom:1px solid #1f2a44;text-align:right}
.panel{background:#101b31;padding:20px;border-radius:20px;margin-top:20px}
.menu a{display:block;color:white;text-decoration:none;padding:12px;background:#111d36;margin-bottom:10px;border-radius:12px}
h1,h2,h3{margin-top:0}
canvas{background:#101b31;border-radius:20px;padding:10px}
</style>

<!-- 📱 v48.1 — تصغير الخطوط في الجوال (يام شات) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" />
<style>

  html, body { font-family: 'Noto Sans Arabic','Tajawal','Cairo',system-ui,-apple-system,sans-serif !important; direction: rtl; -webkit-text-size-adjust: 100%; overflow-x: hidden; max-width: 100vw; }
  html { font-size: 87.5% !important; }
  body { font-size: 13px !important; line-height: 1.45 !important; word-break: break-word; overflow-wrap: anywhere; }
  h1,.h1 { font-size: 18px !important; line-height: 1.3 !important; }
  h2,.h2 { font-size: 16px !important; line-height: 1.3 !important; }
  h3,.h3 { font-size: 14.5px !important; line-height: 1.3 !important; }
  h4,.h4 { font-size: 13.5px !important; line-height: 1.3 !important; }
  h5,.h5 { font-size: 12.5px !important; line-height: 1.3 !important; }
  h6,.h6 { font-size: 12px !important; line-height: 1.3 !important; }
  p, span, div, li, td, th, label, .text, .caption, .desc { font-size: 12.5px !important; line-height: 1.45 !important; }
  small, .small, .meta, .timestamp, .time { font-size: 10.5px !important; }
  button, .btn, .button, [role="button"], input[type="button"], input[type="submit"], a.btn {
    font-size: 12.5px !important; line-height: 1.2 !important; padding: 6px 10px !important; min-height: 32px !important;
    border-radius: 8px !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important;
    max-width: 100% !important; box-sizing: border-box !important;
  }
  input, textarea, select { font-size: 13px !important; padding: 6px 9px !important; min-height: 34px !important; max-width: 100% !important; box-sizing: border-box !important; border-radius: 8px !important; }
  ::placeholder { font-size: 12px !important; opacity: 0.7; }
  *, *::before, *::after { box-sizing: border-box !important; }
  img, video, iframe, canvas { max-width: 100% !important; height: auto; }
  table { max-width: 100% !important; font-size: 12px !important; table-layout: fixed; }
  table td, table th { word-break: break-word; padding: 4px 6px !important; }
  .container, .wrapper, main, section, article { max-width: 100% !important; overflow-x: hidden !important; padding-inline: 10px !important; }
  .card, [class*="Card"] { padding: 10px !important; border-radius: 10px !important; }
}
@media (max-width: 480px) {
  html { font-size: 81.25% !important; }
  body { font-size: 12.5px !important; line-height: 1.42 !important; }
  h1,.h1 { font-size: 16px !important; }
  h2,.h2 { font-size: 14.5px !important; }
  h3,.h3 { font-size: 13.5px !important; }
  h4,.h4 { font-size: 12.5px !important; }
  h5,.h5 { font-size: 12px !important; }
  h6,.h6 { font-size: 11.5px !important; }
  p, span, div, li, td, th, label, .text { font-size: 12px !important; }
  small, .small, .meta, .timestamp { font-size: 10px !important; }
  button, .btn, .button, [role="button"], input[type="submit"] { font-size: 11.5px !important; padding: 5px 8px !important; min-height: 30px !important; }
  input, textarea, select { font-size: 12.5px !important; padding: 5px 8px !important; min-height: 32px !important; }
  ::placeholder { font-size: 11.5px !important; }
  .container, .wrapper, main, section { padding-inline: 8px !important; }
}
@media (max-width: 360px) {
  html { font-size: 75% !important; }
  body { font-size: 12px !important; line-height: 1.4 !important; }
  h1,.h1 { font-size: 15px !important; }
  h2,.h2 { font-size: 13.5px !important; }
  h3,.h3 { font-size: 12.5px !important; }
  h4,.h4 { font-size: 12px !important; }
  h5,.h5 { font-size: 11.5px !important; }
  h6,.h6 { font-size: 11px !important; }
  p, span, div, li, td, th, label { font-size: 11.5px !important; }
  small, .small, .meta { font-size: 9.5px !important; }
  button, .btn, .button, [role="button"], input[type="submit"] { font-size: 11px !important; padding: 4px 7px !important; min-height: 28px !important; }
  input, textarea, select { font-size: 12px !important; padding: 4px 7px !important; min-height: 30px !important; }
  ::placeholder { font-size: 11px !important; }
  .container, .wrapper, main, section { padding-inline: 6px !important; }
}
</style>
<!-- /📱 v48.1 -->

</head>
<body>

<div class="layout">

<div class="sidebar">
<h1>YamShat</h1>

<div class="menu">
<a href="#">لوحة التحكم</a>
<a href="#">المستخدمين</a>
<a href="#">البثوث</a>
<a href="#">الإحصائيات</a>
</div>

</div>

<div class="content">

<h2>لوحة التحكم المباشرة</h2>

<div class="card-grid">
<div class="card">
<h3>إجمالي المستخدمين</h3>
<h1 id="usersCount">0</h1>
</div>

<div class="card">
<h3>البثوث المباشرة</h3>
<h1 id="streamsCount">0</h1>
</div>

<div class="card">
<h3>المنشورات</h3>
<h1 id="postsCount">0</h1>
</div>

<div class="card">
<h3>التقارير</h3>
<h1 id="reportsCount">0</h1>
</div>
</div>

<div class="panel">
<h3>الإحصائيات</h3>
<canvas id="statsChart" height="120"></canvas>
</div>

<div class="panel">
<h3>آخر المستخدمين</h3>

<table>
<thead>
<tr>
<th>المعرف</th>
<th>الاسم</th>
<th>الدور</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>
</table>

</div>

</div>

</div>

<script>
const API_BASE = window.location.origin;

async function loadDashboard(){
try{
const token = localStorage.getItem("token");

const headers = {
"Content-Type":"application/json"
};

if(token){
headers["Authorization"] = `Bearer ${token}`;
}

const dashboardRes = await fetch(`${API_BASE}/admin/dashboard`,{headers});
const dashboard = await dashboardRes.json();

const usersRes = await fetch(`${API_BASE}/admin/users`,{headers});
const usersData = await usersRes.json();

document.getElementById("usersCount").innerText = dashboard.total_users || usersData.total || 0;
document.getElementById("streamsCount").innerText = dashboard.active_streams || 0;
document.getElementById("postsCount").innerText = dashboard.total_posts || 0;
document.getElementById("reportsCount").innerText = dashboard.reports || 0;

const tbody = document.getElementById("usersTable");
tbody.innerHTML = "";

(usersData.users || []).slice(0,10).forEach(user=>{
tbody.innerHTML += `
<tr>
<td>${user.id || "-"}</td>
<td>${user.username || user.name || "-"}</td>
<td>${user.role || "user"}</td>
</tr>
`;
});

const ctx = document.getElementById('statsChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Users','Streams','Posts','Reports'],
datasets:[{
label:'Statistics',
data:[
dashboard.total_users || 0,
dashboard.active_streams || 0,
dashboard.total_posts || 0,
dashboard.reports || 0
]
}]
}
});

}catch(err){
console.error(err);
}
}

loadDashboard();
</script>

</body>
</html>

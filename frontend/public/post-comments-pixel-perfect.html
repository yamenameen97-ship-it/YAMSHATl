<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المنشورات — التعليقات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0a0612;
    color: #fff;
    font-family: 'Noto Sans Arabic', system-ui, -apple-system, sans-serif;
    direction: rtl;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .phone {
    max-width: 500px;
    margin: 0 auto;
    background: linear-gradient(180deg, #0d0818 0%, #0a0612 100%);
    min-height: 100vh;
    position: relative;
    padding-bottom: 90px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 22px 4px;
    direction: ltr;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 14px; }

  /* Top header */
  .top-header {
    display: flex;
    align-items: center;
    padding: 14px 18px 14px;
    position: relative;
  }
  .top-header .back {
    font-size: 24px; color: #fff; cursor: pointer;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: flex-start;
  }
  .top-header .title {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 17px; font-weight: 700; color: #fff;
  }

  /* Post header block */
  .post-header {
    padding: 6px 18px 14px;
    border-bottom: 1px solid rgba(124,77,255,.12);
  }
  .post-row {
    display: flex; align-items: flex-start; gap: 12px;
  }
  .post-avatar-wrap {
    position: relative;
    width: 46px; height: 46px;
    flex-shrink: 0;
  }
  .post-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #1a0f2e 0%, #0a0612 70%);
    border: 2px solid #7c4dff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 14px rgba(124,77,255,.45);
  }
  .post-avatar .Y {
    font-family: 'Noto Sans Arabic', sans-serif;
    font-size: 24px; font-weight: 900;
    color: #a78bff;
    text-shadow: 0 0 10px rgba(167,139,255,.7);
    line-height: 1; transform: translateY(1px);
  }
  .post-add-btn {
    position: absolute; bottom: -2px; left: -2px;
    width: 16px; height: 16px;
    background: #7c4dff;
    border-radius: 50%;
    border: 2px solid #0a0612;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
    line-height: 1;
  }
  .post-info { flex: 1; min-width: 0; padding-top: 2px; }
  .post-username {
    display: flex; align-items: center; gap: 5px;
    font-size: 15px; font-weight: 700; color: #fff;
  }
  .verified-badge {
    width: 14px; height: 14px;
    background: #4a9eff;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 9px; font-weight: 900;
  }
  .post-menu {
    color: #888; font-size: 18px; cursor: pointer;
    padding: 0 4px; user-select: none;
  }
  .post-bio {
    margin-top: 8px;
    font-size: 13px;
    color: #cfc9d8;
    line-height: 1.7;
  }
  .post-bio .heart-emoji { color: #a78bff; }
  .post-bio-line { display: block; }
  .post-date {
    margin-top: 6px;
    font-size: 12px;
    color: #6a6477;
  }

  /* Comments header */
  .comments-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 10px;
  }
  .comments-title {
    font-size: 15px; font-weight: 700; color: #fff;
  }
  .comments-title .count { color: #b8b2c4; font-weight: 500; }
  .sort-filter {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; color: #b8b2c4;
    cursor: pointer;
  }
  .sort-filter .caret { font-size: 10px; }

  /* Comment row */
  .comment {
    display: flex;
    padding: 14px 18px;
    gap: 10px;
  }
  .comment-left {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding-top: 2px; min-width: 28px;
  }
  .left-menu {
    color: #6a6477; font-size: 16px; cursor: pointer;
    line-height: 1; padding: 2px 0;
    user-select: none;
  }
  .heart-btn {
    background: transparent; border: 0;
    cursor: pointer; padding: 4px 0;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
  }
  .heart-icon {
    width: 18px; height: 18px;
    color: #7c4dff;
    transition: transform .15s ease;
  }
  .heart-icon.liked { color: #a78bff; }
  .heart-btn:active .heart-icon { transform: scale(1.25); }
  .like-count {
    font-size: 12px; color: #b8b2c4;
    font-weight: 600;
  }

  .comment-body {
    flex: 1; min-width: 0;
    display: flex; gap: 10px;
    flex-direction: row-reverse;
  }
  .comment-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    background: radial-gradient(circle at 30% 30%, #2a1645 0%, #14082a 70%);
    border: 1.5px solid #7c4dff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 8px rgba(124,77,255,.3);
    overflow: hidden;
    position: relative;
  }
  .comment-avatar .city-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 60%, rgba(167,139,255,.5) 0%, transparent 40%),
      linear-gradient(180deg, transparent 55%, rgba(124,77,255,.4) 55%, rgba(124,77,255,.2) 80%, transparent 100%);
  }
  .comment-avatar .y-mark {
    font-size: 18px; font-weight: 900;
    color: #a78bff;
    text-shadow: 0 0 8px rgba(167,139,255,.7);
    position: relative; z-index: 1;
  }
  .comment-content { flex: 1; min-width: 0; padding-top: 1px; }
  .comment-username-row {
    display: flex; align-items: center; gap: 5px;
    font-size: 13.5px; font-weight: 700; color: #fff;
  }
  .comment-text {
    margin-top: 4px;
    font-size: 14px;
    color: #e8e3f0;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .comment-meta {
    margin-top: 6px;
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: #8a8497;
  }
  .reply-btn {
    background: transparent; border: 0;
    color: #8a8497; font-size: 12px;
    cursor: pointer; font-family: inherit;
    font-weight: 600;
    padding: 0;
  }
  .reply-btn:hover { color: #a78bff; }

  .view-replies {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 18px 4px 78px;
    font-size: 12px; color: #8a8497;
    cursor: pointer;
  }
  .view-replies .line {
    width: 20px; height: 1px; background: #8a8497;
  }
  .view-replies:hover { color: #a78bff; }

  /* Bottom input bar */
  .bottom-input {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 500px; margin: 0 auto;
    background: #0a0612;
    border-top: 1px solid rgba(124,77,255,.15);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; align-items: center; gap: 10px;
  }
  .send-btn {
    background: transparent; border: 0;
    cursor: pointer; padding: 6px;
    color: #a78bff;
    display: flex; align-items: center; justify-content: center;
    transform: scaleX(-1);
  }
  .send-btn svg { width: 22px; height: 22px; }
  .input-field {
    flex: 1;
    background: #1a1226;
    border: 1px solid rgba(124,77,255,.18);
    border-radius: 22px;
    padding: 11px 18px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    text-align: right;
    direction: rtl;
  }
  .input-field::placeholder { color: #6a6477; }
  .input-field:focus { border-color: rgba(124,77,255,.45); }
  .input-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #1a0f2e 0%, #0a0612 70%);
    border: 1.5px solid #7c4dff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 8px rgba(124,77,255,.4);
    flex-shrink: 0;
  }
  .input-avatar .Y {
    font-size: 17px; font-weight: 900;
    color: #a78bff;
    text-shadow: 0 0 6px rgba(167,139,255,.6);
  }

  /* Reply preview chip */
  .reply-preview {
    display: none;
    align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: #14082a;
    border-top: 1px solid rgba(124,77,255,.15);
    font-size: 12px; color: #b8b2c4;
    position: fixed; bottom: 70px; left: 0; right: 0;
    max-width: 500px; margin: 0 auto;
  }
  .reply-preview.active { display: flex; }
  .reply-preview .close-reply {
    color: #8a8497; cursor: pointer; padding: 0 6px;
    font-size: 16px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(124,77,255,.95);
    color: #fff; padding: 8px 18px;
    border-radius: 20px; font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
</style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <div>9:41</div>
    <div class="icons">
      <span>●●●●</span><span>📶</span><span>🔋</span>
    </div>
  </div>

  <!-- Top header -->
  <div class="top-header">
    <div class="back" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <div class="title">المنشورات</div>
  </div>

  <!-- Post header block -->
  <div class="post-header">
    <div class="post-row">
      <div class="post-avatar-wrap">
        <div class="post-avatar"><span class="Y">Y</span></div>
        <div class="post-add-btn">+</div>
      </div>
      <div class="post-info">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="post-username">
            yamenameen97
            <span class="verified-badge">✓</span>
          </div>
          <div class="post-menu">⋯</div>
        </div>
        <div class="post-bio">
          <span class="post-bio-line">صانع محتوى تقني | عاشق للتصميم والمونتاج <span class="heart-emoji">💜</span></span>
          <span class="post-bio-line">شارك شغفي واستمتع بالمحتوى</span>
        </div>
        <div class="post-date">12 مايو</div>
      </div>
    </div>
  </div>

  <!-- Comments header -->
  <div class="comments-header">
    <div class="comments-title">التعليقات <span class="count">(1284)</span></div>
    <div class="sort-filter" onclick="toggleSort()">
      <span id="sortLabel">الأحدث</span>
      <span class="caret">▾</span>
    </div>
  </div>

  <!-- Comments list -->
  <div id="commentsList">
    <!-- comments injected via JS -->
  </div>

</div>

<!-- Reply preview -->
<div class="reply-preview" id="replyPreview">
  <span>الرد على <strong id="replyTo"></strong></span>
  <span class="close-reply" onclick="cancelReply()">✕</span>
</div>

<!-- Bottom input -->
<div class="bottom-input">
  <button class="send-btn" onclick="sendComment()" aria-label="إرسال">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
  <input type="text" class="input-field" id="commentInput" placeholder="أضف تعليقًا..." />
  <div class="input-avatar"><span class="Y">Y</span></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const comments = [
    { id: 1, user: 'design.lens', verified: true, text: 'تصميم خرافي ما شاء الله! التفاصيل رهيبة 🔥', time: '2 س', likes: 256, liked: false, replies: 4 },
    { id: 2, user: 'visual.king', verified: true, text: 'الألوان والإضاءة أسطورية 🚀', time: '3 س', likes: 198, liked: false, replies: 2 },
    { id: 3, user: 'm3luma.tech', verified: true, text: 'ابداعك يوضح في كل تفاصيل 👌', time: '4 س', likes: 142, liked: false, replies: 3 },
    { id: 4, user: 'ux.mo', verified: true, text: 'عااااااااش 🔥 💜', time: '5 س', likes: 112, liked: false, replies: 0, isOwn: true },
    { id: 5, user: 'dark.pixlz', verified: true, text: 'استمر مبدع ✨', time: '6 س', likes: 90, liked: false, replies: 0 }
  ];

  function heartSvg(liked) {
    if (liked) {
      return '<svg class="heart-icon liked" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    }
    return '<svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  }

  function formatCount(n) {
    if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
    return n;
  }

  function renderComments() {
    const list = document.getElementById('commentsList');
    list.innerHTML = comments.map(c => {
      const avatarInner = c.isOwn
        ? '<span class="y-mark">Y</span>'
        : '<div class="city-bg"></div><span class="y-mark" style="font-size:14px;opacity:.85">'+c.user.charAt(0).toUpperCase()+'</span>';
      return `
        <div class="comment" data-id="${c.id}">
          <div class="comment-left">
            <div class="left-menu" onclick="openMenu(${c.id})">⋯</div>
            <button class="heart-btn" onclick="toggleLike(${c.id})">
              ${heartSvg(c.liked)}
              <span class="like-count">${formatCount(c.likes)}</span>
            </button>
          </div>
          <div class="comment-body">
            <div class="comment-avatar">${avatarInner}</div>
            <div class="comment-content">
              <div class="comment-username-row">
                ${c.user}
                ${c.verified ? '<span class="verified-badge">✓</span>' : ''}
              </div>
              <div class="comment-text">${c.text}</div>
              <div class="comment-meta">
                <span>${c.time}</span>
                <button class="reply-btn" onclick="startReply('${c.user}')">رد</button>
              </div>
            </div>
          </div>
        </div>
        ${c.replies > 0 ? `<div class="view-replies" onclick="viewReplies(${c.id})"><span class="line"></span><span>عرض ${c.replies === 2 ? 'ردين' : c.replies + ' ردود'}</span></div>` : ''}
      `;
    }).join('');
  }

  function toggleLike(id) {
    const c = comments.find(x => x.id === id);
    if (!c) return;
    c.liked = !c.liked;
    c.likes += c.liked ? 1 : -1;
    renderComments();
    if (c.liked) showToast('تم الإعجاب 💜');
  }

  let replyTarget = null;
  function startReply(user) {
    replyTarget = user;
    document.getElementById('replyTo').textContent = '@' + user;
    document.getElementById('replyPreview').classList.add('active');
    const input = document.getElementById('commentInput');
    input.value = '@' + user + ' ';
    input.focus();
  }
  function cancelReply() {
    replyTarget = null;
    document.getElementById('replyPreview').classList.remove('active');
    document.getElementById('commentInput').value = '';
  }

  function sendComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    const newComment = {
      id: Date.now(),
      user: 'yamenameen97',
      verified: true,
      text: text,
      time: 'الآن',
      likes: 0,
      liked: false,
      replies: 0,
      isOwn: true
    };
    comments.unshift(newComment);
    input.value = '';
    cancelReply();
    renderComments();
    showToast(replyTarget ? 'تم إرسال الرد' : 'تم إرسال التعليق');
  }

  function viewReplies(id) {
    const c = comments.find(x => x.id === id);
    showToast('عرض ردود ' + c.user);
  }

  function openMenu(id) {
    showToast('خيارات التعليق');
  }

  let sortMode = 'newest';
  function toggleSort() {
    sortMode = sortMode === 'newest' ? 'top' : 'newest';
    document.getElementById('sortLabel').textContent = sortMode === 'newest' ? 'الأحدث' : 'الأعلى';
    if (sortMode === 'top') {
      comments.sort((a,b) => b.likes - a.likes);
    } else {
      comments.sort((a,b) => a.id - b.id > 0 ? -1 : 1);
    }
    renderComments();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1500);
  }

  document.getElementById('commentInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendComment();
  });

  renderComments();
</script>

</body>
</html>

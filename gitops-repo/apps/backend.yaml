# =====================================================
# v83.3 fix (NEW GAP #1 — نسخة gitops):
# مطابقة لـ k8s/06-backend.yaml. ArgoCD يزامن Backend monolith
# (المصدر الوحيد للحقيقة للـ auth/chat/media/search/posts منذ v59.4).
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app-prod
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: yamshat/backend:v83.3
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: yamshat-config
            - secretRef:
                name: yamshat-secrets
          env:
            - name: SERVICE_NAME
              value: backend
          volumeMounts:
            - name: firebase-sa
              mountPath: /secrets/firebase
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1Gi
      volumes:
        - name: firebase-sa
          secret:
            secretName: yamshat-firebase-sa
            items:
              - key: service-account.json
                path: service-account.json
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: app-prod
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: http
      name: http

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yamshat-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/yamshat-gitops.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: app-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

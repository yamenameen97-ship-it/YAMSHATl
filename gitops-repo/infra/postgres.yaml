apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: app-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: app-prod
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: db
      name: db

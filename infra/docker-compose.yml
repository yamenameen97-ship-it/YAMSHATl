version: '3.9'

# v59.4: تم حذف chat-service. الدردشة الآن موحَّدة في backend monolith
#         (المصدر الوحيد للحقيقة — يستخدم Message model في PostgreSQL).

services:
  gateway:
    build: ../gateway
    ports:
      - '8000:8000'
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8000
      POST_SERVICE_URL: http://post-service:8000
      # ⬇ v59.4: التوجيه إلى backend monolith بدلاً من chat-service محذوف
      BACKEND_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_URL: http://backend:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      MEDIA_SERVICE_URL: http://media-service:8000
      SEARCH_SERVICE_URL: http://search-service:8000
      BILLING_SERVICE_URL: http://billing-service:8000
      IDENTITY_SERVICE_URL: http://identity-service:8000
      I18N_SERVICE_URL: http://i18n-service:8000
      DISCOVERY_SERVICE_URL: http://discovery-ai-service:8000

  backend:
    build: ../backend
    expose:
      - '8000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/yamshat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      JWT_ISSUER: ${JWT_ISSUER:-yamshat}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-yamshat-clients}
    depends_on:
      - redis

  auth-service:
    build: ../services/auth-service

  user-service:
    build: ../services/user-service

  post-service:
    build: ../services/post-service

  # ❌ chat-service: حُذف بالكامل في v59.4 — توحيد التخزين مع backend monolith.

  notification-service:
    build: ../services/notification-service

  media-service:
    build: ../services/media-service

  search-service:
    build: ../services/search-service

  billing-service:
    build: ../services/billing-service

  identity-service:
    build: ../services/identity-service

  i18n-service:
    build: ../services/i18n-service

  discovery-ai-service:
    build: ../services/discovery-ai-service

  redis:
    image: redis

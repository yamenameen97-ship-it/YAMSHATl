apiVersion: v1
kind: ConfigMap
metadata:
  name: yamshat-config
  namespace: app-prod
data:
  # --- General ---
  PROJECT_NAME: YAMSHAT API
  SERVICE_NAME: yamshat-backend
  API_PREFIX: /api
  DEBUG: 'false'
  ENVIRONMENT: production

  # --- Database / Cache ---
  # v83.2 fix: أُزيل DATABASE_URL من هنا. كان يحمل كلمة مرور نصية
  # "postgres" ثابتة، بينما الـ postgres pod يقرأ POSTGRES_PASSWORD
  # من Secret ⇒ عدم تطابق وفشل مصادقة عند الاتصال.
  # DATABASE_URL الآن يُبنى في Secret من POSTGRES_PASSWORD.
  REDIS_URL: redis://redis:6379/0
  DB_BOOTSTRAP_ON_START: 'false'

  # --- Observability ---
  ENABLE_METRICS: 'true'
  ENABLE_TRACING: 'true'
  JAEGER_AGENT_HOST: jaeger-agent.monitoring.svc.cluster.local
  JAEGER_AGENT_PORT: '6831'

  # --- CORS ---
  CORS_ORIGINS: https://yamshat8.onrender.com,https://yamshat-1ya4.onrender.com
  CORS_ORIGIN_REGEX: ^https://yamshat[a-zA-Z0-9-]*\.onrender\.com$
  FRONTEND_ORIGIN: https://yamshat8.onrender.com
  BACKEND_ORIGIN: https://yamshat-1ya4.onrender.com

  # --- JWT / Session ---
  ACCESS_TOKEN_EXPIRE_MINUTES: '60'
  REFRESH_TOKEN_EXPIRE_DAYS: '30'
  REFRESH_COOKIE_NAME: yamshat_refresh_token
  REFRESH_COOKIE_SECURE: 'true'
  COOKIE_SAMESITE: none

  # --- LiveKit (Video/Audio Calls) ---
  LIVEKIT_URL: wss://yamshat-enqr8c2d.livekit.cloud

  # --- Firebase (Push) ---
  PUSH_PROVIDER: firebase
  FIREBASE_PROJECT_ID: yamshat-8a74b
  FIREBASE_CREDENTIALS_PATH: /secrets/firebase/service-account.json
  FIREBASE_SERVICE_ACCOUNT_PATH: /secrets/firebase/service-account.json

  # --- Cloudinary (Media) ---
  CLOUDINARY_CLOUD_NAME: dux8i95wr
  CLOUDINARY_FOLDER: yamshat

  # --- Email (Resend) ---
  RESEND_FROM: YAMSHAT <onboarding@resend.dev>
  RESEND_REPLY_TO: yamenameen97@gmail.com
  SMTP_HOST: smtp.resend.com
  SMTP_PORT: '465'
  SMTP_USERNAME: resend
  SMTP_FROM: YAMSHAT <onboarding@resend.dev>
  SMTP_USE_TLS: 'true'

  # --- Postgres identity (non-secret) ---
  # v83.2 fix: نُقلت من hardcoded في 03-postgres.yaml لتوحيد المصدر.
  POSTGRES_USER: postgres
  POSTGRES_DB: yamshat
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'

  # --- Rate Limits ---
  LOGIN_RATE_LIMIT_PER_MINUTE: '10'
  API_RATE_LIMIT_PER_MINUTE: '100'
  BRUTE_FORCE_MAX_ATTEMPTS: '8'
  BRUTE_FORCE_LOCKOUT_SECONDS: '300'

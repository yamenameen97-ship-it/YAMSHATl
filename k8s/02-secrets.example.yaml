apiVersion: v1
kind: Secret
metadata:
  name: yamshat-secrets
  namespace: app-prod
type: Opaque
stringData:
  # --- Core Security ---
  SECRET_KEY: replace-with-strong-secret-min-64-chars
  POSTGRES_PASSWORD: replace-with-strong-postgres-password

  # --- Database URL ---
  # v83.2 fix: نُقل DATABASE_URL كاملاً إلى الأسرار لأنه يحوي كلمة مرور
  # postgres. كان قديماً في ConfigMap بقيمة "postgres:postgres" نصية،
  # وهي لا تطابق POSTGRES_PASSWORD الفعلية من الـ Secret ⇒ فشل مصادقة.
  # ⚠️ يجب أن يطابق الجزء الثاني هنا POSTGRES_PASSWORD أعلاه بالضبط.
  DATABASE_URL: postgresql://postgres:replace-with-strong-postgres-password@postgres:5432/yamshat

  # --- LiveKit ---
  LIVEKIT_API_KEY: replace-with-livekit-api-key
  LIVEKIT_API_SECRET: replace-with-livekit-api-secret

  # --- Cloudinary ---
  CLOUDINARY_API_KEY: replace-with-cloudinary-api-key
  CLOUDINARY_API_SECRET: replace-with-cloudinary-api-secret

  # --- Email (Resend / SMTP) ---
  RESEND_API_KEY: re_replace_with_real_key
  SMTP_PASSWORD: re_replace_with_real_smtp_password

  # --- Admin Bootstrap ---
  PRIMARY_ADMIN_EMAIL: admin@example.com
  PRIMARY_ADMIN_PASSWORD: replace-with-strong-admin-password
---
# Firebase service account is mounted as a file secret, not env vars
apiVersion: v1
kind: Secret
metadata:
  name: yamshat-firebase-sa
  namespace: app-prod
type: Opaque
stringData:
  service-account.json: |
    {
      "type": "service_account",
      "project_id": "REPLACE_ME",
      "private_key_id": "REPLACE_ME",
      "private_key": "-----BEGIN PRIVATE KEY-----\nREPLACE_ME\n-----END PRIVATE KEY-----\n",
      "client_email": "REPLACE_ME@REPLACE_ME.iam.gserviceaccount.com"
    }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: yamshat/gateway:v2.2.0
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: yamshat-config
          # v83.2 fix: gateway/main.py يقرأ AUTH/POST/MEDIA/SEARCH_SERVICE_URL
          # لكن Deployment القديم لم يضعها ⇒ كانت تعود إلى defaults
          # مثل http://auth-service:8000 التي لا وجود لها في العنقود،
          # ما يؤدي إلى 502/timeout على /api/auth و /api/media و /api/search.
          # نحن الآن نوجّه الجميع إلى backend monolith كمصدر حقيقة موحّد
          # (نفس منطق docker-compose.yml بعد v59.4).
          env:
            # مسارات المستخدمين والمنشورات — services حقيقية موجودة في العنقود
            - name: USER_SERVICE_URL
              value: http://user-service:8000

            # v59.4/v83.2: توحيد الدردشة داخل backend monolith
            - name: BACKEND_SERVICE_URL
              value: http://backend:8000
            - name: CHAT_SERVICE_URL
              value: http://backend:8000

            # v83.2 fix: المتغيرات الأربعة الناقصة سابقاً
            - name: AUTH_SERVICE_URL
              value: http://backend:8000
            - name: POST_SERVICE_URL
              value: http://backend:8000
            - name: MEDIA_SERVICE_URL
              value: http://backend:8000
            - name: SEARCH_SERVICE_URL
              value: http://backend:8000

            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8000
            - name: BILLING_SERVICE_URL
              value: http://billing-service:8000
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service:8000
            - name: I18N_SERVICE_URL
              value: http://i18n-service:8000
            - name: DISCOVERY_SERVICE_URL
              value: http://discovery-ai-service:8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: app-prod
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: http
      name: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: your-dockerhub-username/gateway:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: yamshat-config
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:8000
            - name: CHAT_SERVICE_URL
              value: http://chat-service:8000
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: app-prod
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: http
      name: http

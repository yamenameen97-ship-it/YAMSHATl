apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yamshat-ingress
  namespace: app-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '20m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
spec:
  ingressClassName: nginx
  rules:
    - host: api.yamshat.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80

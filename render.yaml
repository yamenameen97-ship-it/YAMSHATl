services:
  - type: web
    name: yamshat-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: bash scripts/predeploy.sh
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: '60'
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BACKEND_ORIGIN
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ENABLE_TRACING
        value: 'false'
      - key: DB_BOOTSTRAP_ON_START
        value: 'true'
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: '465'
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: 'true'
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: IMAGEKIT_FOLDER
        value: /yamshat
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

  - type: web
    name: yamshat-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_BACKEND_ORIGIN
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_STUN_URL
        sync: false
      - key: VITE_STUN_URL_FALLBACK
        sync: false
      - key: VITE_STUN_URLS
        sync: false
      - key: VITE_TURN_URL
        sync: false
      - key: VITE_TURN_URL_FALLBACK
        sync: false
      - key: VITE_TURN_URL_TCP
        sync: false
      - key: VITE_TURN_URLS
        sync: false
      - key: VITE_TURN_USERNAME
        sync: false
      - key: VITE_TURN_CREDENTIAL
        sync: false
      - key: VITE_PRIMARY_ADMIN_EMAIL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ============================================================
# YAMSHAT - Render Blueprint (محدّث - إصلاح Python 3.14 + pydantic-core)
# ============================================================
# الإصلاحات المطبقة في هذا الإصدار:
# - إضافة PYTHON_VERSION=3.11.10 لكل خدمة Python (لمنع استخدام 3.14)
#   السبب: pydantic-core==2.27.2 لا يملك wheels لـ Python 3.14
#   فيحاول البناء من المصدر عبر Rust/cargo ويفشل بسبب
#   نظام الملفات للقراءة فقط (Read-only file system, os error 30)
# - ترقية pip/setuptools/wheel قبل التثبيت
# - تصحيح نوع pserv لـ redis
# - استخدام databases الرسمية لـ PostgreSQL
# - healthCheckPath لكل خدمة
# - autoDeploy و branch صريحان
# - متغيرات CORS موحدة عبر الخدمات
# ============================================================

services:
  # ----------------------------------------------------------
  # Frontend (Static Site)
  # ----------------------------------------------------------
  - type: web
    name: yamshat-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://yamshat-gateway.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ----------------------------------------------------------
  # Gateway
  # ----------------------------------------------------------
  - type: web
    name: yamshat-gateway
    env: python
    plan: starter
    buildCommand: cd gateway && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd gateway && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: AUTH_SERVICE_URL
        value: https://yamshat-auth-service.onrender.com
      - key: USER_SERVICE_URL
        value: https://yamshat-user-service.onrender.com
      - key: POST_SERVICE_URL
        value: https://yamshat-post-service.onrender.com
      - key: CHAT_SERVICE_URL
        value: https://yamshat-chat-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://yamshat-notification-service.onrender.com
      - key: MEDIA_SERVICE_URL
        value: https://yamshat-media-service.onrender.com
      - key: SEARCH_SERVICE_URL
        value: https://yamshat-search-service.onrender.com
      - key: BILLING_SERVICE_URL
        value: https://yamshat-billing-service.onrender.com
      - key: IDENTITY_SERVICE_URL
        value: https://yamshat-identity-service.onrender.com
      - key: I18N_SERVICE_URL
        value: https://yamshat-i18n-service.onrender.com
      - key: DISCOVERY_SERVICE_URL
        value: https://yamshat-discovery-ai-service.onrender.com
      - key: CORS_ORIGINS
        value: https://yamshat-frontend.onrender.com
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$

  # ----------------------------------------------------------
  # Backend (الموحد)
  # ----------------------------------------------------------
  - type: web
    name: yamshat-backend
    env: python
    plan: starter
    buildCommand: cd backend && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:application --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yamshat-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://yamshat-frontend.onrender.com
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  # ----------------------------------------------------------
  # Auth Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-auth-service
    env: python
    plan: starter
    buildCommand: cd services/auth-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/auth-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://yamshat-frontend.onrender.com,https://yamshat-gateway.onrender.com
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$

  # ----------------------------------------------------------
  # User Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-user-service
    env: python
    plan: starter
    buildCommand: cd services/user-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/user-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString

  # ----------------------------------------------------------
  # Post Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-post-service
    env: python
    plan: starter
    buildCommand: cd services/post-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/post-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString

  # ----------------------------------------------------------
  # Chat Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-chat-service
    env: python
    plan: starter

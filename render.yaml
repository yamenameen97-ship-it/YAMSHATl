services:
  - type: web
    name: yamshat
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: yamshat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: DATABASE_URL
        sync: false
      - key: DB_PATH
        value: /var/data/yamshat.db
      - key: FRONTEND_ORIGIN
        value: https://yamshatl-1.onrender.com
      - key: BACKEND_ORIGIN
        value: https://yamshatl.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://yamshatl-1.onrender.com,https://yamshatl.onrender.com,capacitor://localhost,ionic://localhost
      - key: MAX_CONTENT_LENGTH_MB
        value: "5"
      - key: JWT_EXPIRE_DAYS
        value: "30"
      - key: RATELIMIT_DEFAULT
        value: 300 per hour,60 per minute
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

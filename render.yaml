services:
  - type: web
    name: yamshatl
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://yamshatl-1.onrender.com
      - key: BACKEND_ORIGIN
        value: https://yamshatl.onrender.com
      - key: RENDER_EXTERNAL_URL
        value: https://yamshatl.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://yamshatl-1.onrender.com,https://yamshatl.onrender.com,capacitor://localhost,ionic://localhost,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:5000,http://localhost:5000
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: SESSION_DAYS
        value: "30"
      - key: JWT_EXPIRE_DAYS
        value: "30"
      - key: MAX_CONTENT_LENGTH_MB
        value: "25"
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_COIN_BALANCE
        value: "0"
      - key: LIVEKIT_PROJECT_ID
        sync: false
      - key: LIVEKIT_SIP_URI
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_WS_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_SECRET
        sync: false
      - key: PRIMARY_ADMIN_EMAIL
        value: adminadminya@gmail.com
      - key: PRIMARY_ADMIN_USERNAME
        value: adminadminya
      - key: PRIMARY_ADMIN_PASSWORD
        value: yamen1234
      - key: ADMIN_EMAILS
        value: adminadminya@gmail.com
      - key: ADMIN_USERNAMES
        value: adminadminya
      - key: LEGACY_ADMIN_EMAILS
        value: adminyamen@gmail.com
      - key: LEGACY_ADMIN_USERNAMES
        value: adminyamen
      - key: RESET_CODE_EXPIRE_MINUTES
        value: "10"
      - key: RESET_CODE_LENGTH
        value: "6"
      - key: RESET_MAX_VERIFY_ATTEMPTS
        value: "5"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Yamshat
      - key: SMTP_USE_TLS
        value: "1"
      - key: SMTP_USE_SSL
        value: "0"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false

  - type: static
    name: yamshatl-1
    rootDir: frontend
    buildCommand: |
      cat > app-config.js <<EOF
      window.APP_API_BASE = "https://yamshatl.onrender.com/api";
      window.YAMSHAT_FRONTEND_ORIGIN = "https://yamshatl-1.onrender.com";
      window.YAMSHAT_BACKEND_ORIGIN = "https://yamshatl.onrender.com";
      EOF
    staticPublishPath: .
    autoDeploy: true

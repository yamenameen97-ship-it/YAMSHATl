      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString

  # ----------------------------------------------------------
  # Identity Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-identity-service
    env: python
    plan: starter
    buildCommand: cd services/identity-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/identity-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString

  # ----------------------------------------------------------
  # Redis Cache
  # ----------------------------------------------------------
  - type: redis
    name: yamshat-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

# ============================================================
# قواعد البيانات
# ============================================================
databases:
  - name: yamshat-db
    databaseName: yamshat
    user: yamshat_user
    plan: free

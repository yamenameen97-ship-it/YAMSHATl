services:
  - type: web
    name: yamshat-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: bash scripts/predeploy.sh
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: '60'
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BACKEND_ORIGIN
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ENABLE_TRACING
        value: 'false'
      - key: DB_BOOTSTRAP_ON_START
        value: 'true'
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: 'true'
      - key: FIREBASE_CREDENTIALS_PATH
        value: mobile/app/google-services.json
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

  - type: web
    name: yamshat-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_BACKEND_ORIGIN
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

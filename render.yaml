      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yamshat-redis
          type: redis
          property: connectionString

  # ----------------------------------------------------------
  # Notification Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-notification-service
    env: python
    plan: starter
    buildCommand: cd notification-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd notification-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION

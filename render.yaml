  # ----------------------------------------------------------
  # Billing Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-billing-service
    env: python
    plan: starter
    buildCommand: cd services/billing-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/billing-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION

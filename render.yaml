services:
  - type: web
    name: yamshat
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: yamshat-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: DB_PATH
        value: /var/data/yamshat.db

  # ----------------------------------------------------------
  # Media Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-media-service
    env: python
    plan: starter
    buildCommand: cd services/media-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/media-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: yamshat-db
          property: connectionString

  # ----------------------------------------------------------
  # Search Service
  # ----------------------------------------------------------
  - type: web
    name: yamshat-search-service
    env: python
    plan: starter
    buildCommand: cd services/search-service && python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd services/search-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION

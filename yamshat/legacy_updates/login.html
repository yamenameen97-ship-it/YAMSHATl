<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamshat | تسجيل الدخول</title>
    <link rel="stylesheet" href="/chat.css">
</head>
<body class="login-body">
    <div class="login-card card">
        <div class="brand centered">
            <div class="brand-icon">🔐</div>
            <div>
                <h1>تسجيل الدخول للشات</h1>
                <p>Session + JWT جاهزين</p>
            </div>
        </div>

        <div class="demo-box">
            <div>حسابات تجريبية:</div>
            <div><strong>yamenameen97@gmail.com</strong> / yamen1234 (Admin)</div>
            <div><strong>yasryameen21@gmail.com</strong> / 12345678 (Subscriber)</div>
            <div><strong>user1</strong> / 1234</div>
            <div><strong>user2</strong> / 1234</div>
        </div>

        <label class="input-label">اسم المستخدم</label>
        <input id="username" class="text-input" placeholder="username">

        <label class="input-label">كلمة المرور</label>
        <input id="password" class="text-input" type="password" placeholder="••••">

        <button id="loginBtn" class="primary-btn wide-btn">دخول</button>
        <p id="loginStatus" class="subtle"></p>
    </div>

    <script>
        const statusEl = document.getElementById('loginStatus');
        
        // التحقق من وجود توكن سابق
        if (localStorage.getItem('yamshat_token')) {
            window.location.href = '/chat.html';
        }
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                statusEl.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
                statusEl.style.color = '#e74c3c';
                return;
            }
            
            statusEl.textContent = 'جاري التحقق...';
            statusEl.style.color = '#3498db';
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.message || data.error || 'فشل تسجيل الدخول');
                }
                
                // حفظ التوكن
                if (data.access_token || data.token) {
                    localStorage.setItem('yamshat_token', data.access_token || data.token);
                    localStorage.setItem('yamshat_user', data.user || username);
                    localStorage.setItem('yamshat_role', data.role || 'user');
                }
                
                statusEl.textContent = 'تم تسجيل الدخول بنجاح، جاري التوجيه...';
                statusEl.style.color = '#27ae60';
                
                // تأخير قليل قبل التوجيه
                setTimeout(() => {
                    window.location.href = '/chat.html';
                }, 500);
                
            } catch (error) {
                console.error('Login error:', error);
                statusEl.textContent = error.message || 'تعذر تسجيل الدخول';
                statusEl.style.color = '#e74c3c';
            }
        });
        
        // السماح بالدخول عند الضغط على Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>

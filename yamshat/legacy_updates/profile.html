<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamshat | الملف الشخصي</title>
    <link rel="stylesheet" href="/chat.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --border: #bdc3c7;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .cover-section {
            position: relative;
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-upload {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .cover-upload:hover {
            background: rgba(0,0,0,0.8);
        }

        .profile-header {
            padding: 0 30px;
            position: relative;
            margin-bottom: 30px;
        }

        .profile-pic-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-top: -75px;
            margin-bottom: 20px;
        }

        .profile-picture {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            box-shadow: var(--shadow-lg);
            background: var(--light);
        }

        .profile-pic-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.3s;
            box-shadow: var(--shadow);
        }

        .profile-pic-upload:hover {
            background: var(--secondary);
        }

        .profile-info {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .profile-name-section h1 {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .profile-name-section .username {
            color: #95a5a6;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #95a5a6;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: white;
            border-color: var(--primary);
        }

        .profile-content {
            padding: 0 30px 30px;
        }

        .bio-section {
            margin-bottom: 30px;
        }

        .bio-section h3 {
            font-size: 14px;
            color: #95a5a6;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .bio-text {
            font-size: 16px;
            color: var(--dark);
            line-height: 1.6;
            padding: 15px;
            background: var(--light);
            border-radius: 6px;
            border-right: 3px solid var(--primary);
        }

        .bio-edit {
            margin-top: 10px;
        }

        .bio-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .bio-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .links-section {
            margin-bottom: 30px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--light);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .link-item input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--dark);
        }

        .link-item input::placeholder {
            color: #bdc3c7;
        }

        .link-item input:focus {
            outline: none;
        }

        .link-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 18px;
            margin-right: 10px;
        }

        .add-link-btn {
            margin-top: 10px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .add-link-btn:hover {
            background: var(--secondary);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 20px;
            gap: 20px;
        }

        .tab {
            padding: 12px 0;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: #95a5a6;
            font-weight: 600;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .tab:hover {
            color: var(--dark);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .post-card {
            background: var(--light);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .post-info {
            padding: 12px;
        }

        .post-title {
            font-size: 14px;
            color: var(--dark);
            font-weight: 600;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .post-date {
            font-size: 12px;
            color: #95a5a6;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #95a5a6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--dark);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
        }

        @media (max-width: 768px) {
            .profile-container {
                border-radius: 0;
            }

            .cover-section {
                height: 150px;
            }

            .profile-pic-wrapper {
                width: 100px;
                height: 100px;
                margin-top: -50px;
            }

            .profile-header {
                padding: 0 20px;
            }

            .profile-content {
                padding: 0 20px 20px;
            }

            .profile-name-section h1 {
                font-size: 22px;
            }

            .profile-stats {
                gap: 15px;
            }

            .stat-number {
                font-size: 18px;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #95a5a6;
        }

        .spinner {
            border: 3px solid var(--light);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid var(--success);
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid var(--danger);
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Cover Section -->
        <div class="cover-section">
            <img id="coverImage" class="cover-image" src="https://via.placeholder.com/900x250?text=Cover+Image" alt="Cover">
            <button class="cover-upload" id="coverUploadBtn">📷 تغيير الغلاف</button>
            <input type="file" id="coverUploadInput" style="display: none;" accept="image/*">
        </div>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-pic-wrapper">
                <img id="profilePicture" class="profile-picture" src="https://via.placeholder.com/150?text=Profile" alt="Profile">
                <button class="profile-pic-upload" id="profileUploadBtn">📷</button>
                <input type="file" id="profileUploadInput" style="display: none;" accept="image/*">
            </div>

            <div class="profile-info">
                <div class="profile-name-section">
                    <h1 id="displayName">اسم المستخدم</h1>
                    <div class="username" id="username">@username</div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-number" id="postsCount">0</div>
                            <div class="stat-label">منشورات</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" id="followersCount">0</div>
                            <div class="stat-label">متابعون</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" id="followingCount">0</div>
                            <div class="stat-label">متابع</div>
                        </div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="btn btn-primary" id="editProfileBtn">✏️ تعديل الملف الشخصي</button>
                    <button class="btn btn-secondary" id="shareProfileBtn">🔗 مشاركة</button>
                </div>
            </div>
        </div>

        <!-- Bio Section -->
        <div class="profile-content">
            <div class="bio-section">
                <h3>نبذة عني</h3>
                <div id="bioDisplay" class="bio-text">لم تضف نبذة عن نفسك بعد</div>
                <div class="bio-edit" id="bioEditSection" style="display: none;">
                    <textarea id="bioTextarea" class="bio-textarea" placeholder="أخبرنا عن نفسك..."></textarea>
                    <div style="margin-top: 10px; display: flex; gap: 10px;">
                        <button class="btn btn-primary" id="saveBioBtn">حفظ</button>
                        <button class="btn btn-secondary" id="cancelBioBtn">إلغاء</button>
                    </div>
                </div>
            </div>

            <!-- Links Section -->
            <div class="links-section">
                <h3>الروابط</h3>
                <div class="links-grid" id="linksContainer"></div>
                <button class="add-link-btn" id="addLinkBtn">+ إضافة رابط</button>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="posts">المنشورات</button>
                <button class="tab" data-tab="followers">المتابعون</button>
                <button class="tab" data-tab="following">المتابع</button>
            </div>

            <!-- Posts Tab -->
            <div id="posts" class="tab-content active">
                <div id="postsContainer" class="posts-grid"></div>
                <div id="postsEmpty" class="empty-state" style="display: none;">
                    <div>لا توجد منشورات حتى الآن</div>
                </div>
            </div>

            <!-- Followers Tab -->
            <div id="followers" class="tab-content">
                <div id="followersContainer" class="posts-grid"></div>
                <div id="followersEmpty" class="empty-state" style="display: none;">
                    <div>لا يوجد متابعون حتى الآن</div>
                </div>
            </div>

            <!-- Following Tab -->
            <div id="following" class="tab-content">
                <div id="followingContainer" class="posts-grid"></div>
                <div id="followingEmpty" class="empty-state" style="display: none;">
                    <div>لم تتابع أحداً حتى الآن</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeEditModal">✕</button>
            <div class="modal-header">تعديل الملف الشخصي</div>
            
            <div id="editMessages"></div>

            <form id="editForm">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="editName" placeholder="اسمك الكامل">
                </div>

                <div class="form-group">
                    <label>الموقع</label>
                    <input type="text" id="editLocation" placeholder="مدينتك">
                </div>

                <div class="form-group">
                    <label>الموقع الإلكتروني</label>
                    <input type="url" id="editWebsite" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label>نبذة عني</label>
                    <textarea id="editBio" placeholder="أخبرنا عن نفسك..." style="min-height: 100px;"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== Global State =====
        let currentUser = null;
        let isOwnProfile = true;

        // ===== Initialization =====
        async function initProfile() {
            try {
                const token = localStorage.getItem('yamshat_token');
                if (!token) {
                    window.location.href = '/login.html';
                    return;
                }

                // Load user profile
                await loadUserProfile();
                setupEventListeners();
            } catch (error) {
                console.error('Error initializing profile:', error);
            }
        }

        async function loadUserProfile() {
            try {
                const response = await fetch('/me', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load profile');
                }

                const data = await response.json();
                currentUser = data.username;

                // Update UI with user data
                document.getElementById('displayName').textContent = data.profile?.username || currentUser;
                document.getElementById('username').textContent = `@${currentUser}`;

                // Load additional profile data
                await loadProfileData();
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        async function loadProfileData() {
            try {
                const response = await fetch(`/api/profile/${currentUser}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    updateProfileUI(data);
                }
            } catch (error) {
                console.error('Error loading profile data:', error);
            }
        }

        function updateProfileUI(data) {
            if (data.bio) {
                document.getElementById('bioDisplay').textContent = data.bio;
            }
            if (data.profile_picture) {
                document.getElementById('profilePicture').src = data.profile_picture;
            }
            if (data.cover_image) {
                document.getElementById('coverImage').src = data.cover_image;
            }
            document.getElementById('postsCount').textContent = data.posts_count || 0;
            document.getElementById('followersCount').textContent = data.followers_count || 0;
            document.getElementById('followingCount').textContent = data.following_count || 0;

            // Load links
            if (data.links && Array.isArray(data.links)) {
                renderLinks(data.links);
            }
        }

        function renderLinks(links) {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';
            links.forEach((link, index) => {
                const linkEl = document.createElement('div');
                linkEl.className = 'link-item';
                linkEl.innerHTML = `
                    <input type="text" value="${link}" readonly>
                    <button type="button" class="link-remove" onclick="removeLink(${index})">✕</button>
                `;
                container.appendChild(linkEl);
            });
        }

        function setupEventListeners() {
            // Edit profile
            document.getElementById('editProfileBtn').addEventListener('click', openEditModal);
            document.getElementById('closeEditModal').addEventListener('click', closeEditModal);
            document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
            document.getElementById('editForm').addEventListener('submit', saveProfile);

            // Bio editing
            document.getElementById('bioDisplay').addEventListener('click', () => {
                document.getElementById('bioDisplay').style.display = 'none';
                document.getElementById('bioEditSection').style.display = 'block';
                document.getElementById('bioTextarea').value = document.getElementById('bioDisplay').textContent;
            });

            document.getElementById('saveBioBtn').addEventListener('click', saveBio);
            document.getElementById('cancelBioBtn').addEventListener('click', cancelBioEdit);

            // File uploads
            document.getElementById('coverUploadBtn').addEventListener('click', () => {
                document.getElementById('coverUploadInput').click();
            });
            document.getElementById('coverUploadInput').addEventListener('change', uploadCoverImage);

            document.getElementById('profileUploadBtn').addEventListener('click', () => {
                document.getElementById('profileUploadInput').click();
            });
            document.getElementById('profileUploadInput').addEventListener('change', uploadProfilePicture);

            // Links
            document.getElementById('addLinkBtn').addEventListener('click', addLinkInput);

            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', switchTab);
            });

            // Share profile
            document.getElementById('shareProfileBtn').addEventListener('click', shareProfile);
        }

        function openEditModal() {
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveProfile(e) {
            e.preventDefault();
            const messagesEl = document.getElementById('editMessages');
            messagesEl.innerHTML = '';

            try {
                const profileData = {
                    bio: document.getElementById('editBio').value,
                    location: document.getElementById('editLocation').value,
                    website: document.getElementById('editWebsite').value,
                };

                const response = await fetch('/api/profile/update', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(profileData)
                });

                if (!response.ok) {
                    throw new Error('Failed to save profile');
                }

                messagesEl.innerHTML = '<div class="success-message">✅ تم حفظ التغييرات بنجاح</div>';
                await loadProfileData();
                setTimeout(closeEditModal, 1500);
            } catch (error) {
                messagesEl.innerHTML = `<div class="error-message">❌ ${error.message}</div>`;
            }
        }

        async function saveBio() {
            const bio = document.getElementById('bioTextarea').value;
            try {
                const response = await fetch('/api/profile/update', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ bio })
                });

                if (response.ok) {
                    document.getElementById('bioDisplay').textContent = bio || 'لم تضف نبذة عن نفسك بعد';
                    cancelBioEdit();
                }
            } catch (error) {
                console.error('Error saving bio:', error);
            }
        }

        function cancelBioEdit() {
            document.getElementById('bioDisplay').style.display = 'block';
            document.getElementById('bioEditSection').style.display = 'none';
        }

        async function uploadCoverImage(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('coverImage').src = data.file_url;
                    // Save to profile
                    await fetch('/api/profile/update', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ cover_image: data.file_url })
                    });
                }
            } catch (error) {
                console.error('Error uploading cover image:', error);
            }
        }

        async function uploadProfilePicture(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('profilePicture').src = data.file_url;
                    // Save to profile
                    await fetch('/api/profile/update', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ profile_picture: data.file_url })
                    });
                }
            } catch (error) {
                console.error('Error uploading profile picture:', error);
            }
        }

        function addLinkInput() {
            const container = document.getElementById('linksContainer');
            const linkEl = document.createElement('div');
            linkEl.className = 'link-item';
            linkEl.innerHTML = `
                <input type="url" placeholder="https://example.com" class="new-link">
                <button type="button" class="link-remove" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(linkEl);
        }

        function removeLink(index) {
            // Implementation for removing links
        }

        function switchTab(e) {
            const tabName = e.target.dataset.tab;
            
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            // Add active class to clicked tab and corresponding content
            e.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            // Load tab content
            if (tabName === 'followers') {
                loadFollowers();
            } else if (tabName === 'following') {
                loadFollowing();
            }
        }

        async function loadFollowers() {
            try {
                const response = await fetch(`/api/followers/${currentUser}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    }
                });

                if (response.ok) {
                    const followers = await response.json();
                    renderFollowersList(followers, 'followersContainer', 'followersEmpty');
                }
            } catch (error) {
                console.error('Error loading followers:', error);
            }
        }

        async function loadFollowing() {
            try {
                const response = await fetch(`/api/following/${currentUser}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('yamshat_token')}`
                    }
                });

                if (response.ok) {
                    const following = await response.json();
                    renderFollowersList(following, 'followingContainer', 'followingEmpty');
                }
            } catch (error) {
                console.error('Error loading following:', error);
            }
        }

        function renderFollowersList(users, containerId, emptyId) {
            const container = document.getElementById(containerId);
            const emptyEl = document.getElementById(emptyId);

            if (users.length === 0) {
                container.innerHTML = '';
                emptyEl.style.display = 'block';
                return;
            }

            emptyEl.style.display = 'none';
            container.innerHTML = users.map(user => `
                <div class="post-card" style="cursor: pointer;" onclick="viewProfile('${user}')">
                    <div class="post-info">
                        <div class="post-title">${user}</div>
                    </div>
                </div>
            `).join('');
        }

        function shareProfile() {
            const profileUrl = `${window.location.origin}/profile/${currentUser}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Yamshat Profile',
                    text: `Check out my profile on Yamshat!`,
                    url: profileUrl
                });
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(profileUrl).then(() => {
                    alert('تم نسخ الرابط إلى الحافظة');
                });
            }
        }

        function viewProfile(username) {
            window.location.href = `/profile/${username}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
